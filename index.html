<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CangMiao 的网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
        }

        /* ========== 新增：全屏遮罩层 ========== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;         /* 确保在所有内容之上 */
            background: transparent; /* 完全透明，不影响视觉 */
            cursor: default;
            /* 这条是关键：阻止所有触摸和点击事件穿透 */
            pointer-events: all;
        }

        /* ========== 加载动画区域（保持在遮罩上方可见） ========== */
        .loading-container {
            position: fixed;       /* 改为固定定位，这样就不会被遮罩盖住 */
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;        /* 比遮罩层还高一层，保证能看到 */
            width: 60px;
            height: 60px;
        }

        .loader-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 6px solid rgba(255,255,255,0.3);
            border-top: 6px solid #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .checkmark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 40px;
            height: 40px;
        }

        .checkmark.show {
            animation: popIn 0.3s ease forwards;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            80% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .checkmark svg {
            width: 100%;
            height: 100%;
        }

        .checkmark circle {
            fill: none;
            stroke: #4CAF50;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: draw 0.5s ease forwards 0.1s;
        }

        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }

        /* ========== 按钮和卡片样式保持不变 ========== */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .btn-page1 {
            background: #ffffff;
            color: #667eea;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .btn-page2 {
            background: rgba(255,255,255,0.25);
            color: #ffffff;
            border: 2px solid rgba(255,255,255,0.6);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .card .emoji {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .card h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 15px;
        }

        .card p {
            font-size: 1.2em;
            color: #666;
        }
    </style>
</head>
<body>

    <!-- ========== 新增：全屏遮罩（拦截所有交互） ========== -->
    <div class="loading-overlay" id="loadingOverlay"></div>

    <!-- ========== 顶部加载动画（始终可见） ========== -->
    <div class="loading-container" id="loadingContainer">
        <div class="loader-circle" id="loaderCircle"></div>
        <div class="checkmark" id="checkmark">
            <svg viewBox="0 0 52 52">
                <circle cx="26" cy="26" r="20" />
                <path fill="none" stroke="#4CAF50" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" d="M14 27 l8 8 l16-16" />
            </svg>
        </div>
    </div>

    <!-- ========== 页面主体 ========== -->
    <div class="btn-group">
        <button class="btn btn-page1" onclick="showPage(1)">📄 首页</button>
        <button class="btn btn-page2" onclick="showPage(2)">📄 第二页</button>
    </div>

    <div class="card" id="contentArea">
        <div class="emoji">👋</div>
        <h1>你好，这里是 cangmiao</h1>
        <p>欢迎来到我的个人网站</p>
    </div>

    <script>
        // 加载完成后，解除触屏锁定
        window.addEventListener('load', function() {
            const loaderCircle = document.getElementById('loaderCircle');
            const checkmark = document.getElementById('checkmark');
            const overlay = document.getElementById('loadingOverlay');

            // 同时锁定页面滚动
            document.body.style.overflow = 'hidden';

            setTimeout(function() {
                // 隐藏旋转圆圈
                loaderCircle.style.display = 'none';
                // 显示对勾
                checkmark.classList.add('show');

                // 关键步骤：0.5秒后移除遮罩并恢复滚动，让对勾动画播完再解锁
                setTimeout(function() {
                    overlay.style.display = 'none';        // 移除事件拦截
                    document.body.style.overflow = '';     // 恢复滚动
                }, 500);
            }, 3000);
        });

        function showPage(pageNum) {
            const contentArea = document.getElementById('contentArea');

            if (pageNum === 1) {
                contentArea.innerHTML = `
                    <div class="emoji">👋</div>
                    <h1>你好，这里是 cangmiao</h1>
                    <p>欢迎来到我的个人网站</p>
                `;
            } else if (pageNum === 2) {
                contentArea.innerHTML = `
                    <div class="emoji">🎉</div>
                    <h1>test page</h1>
                    <p>第二个HTML已成功部署</p>
                `;
            }
        }
    </script>

</body>
</html>
