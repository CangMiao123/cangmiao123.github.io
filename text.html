<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页 - CangMiao</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .btn-home {
            background: rgba(255,255,255,0.25);
            color: #ffffff;
            border: 2px solid rgba(255,255,255,0.6);
        }

        .btn-test {
            background: #ffffff;
            color: #f5576c;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .card .emoji {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .card h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 15px;
        }

        .card p {
            font-size: 1.2em;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="btn-group">
        <button class="btn btn-home" onclick="location.href='index.html'">🏠 首页</button>
        <button class="btn btn-test" onclick="location.href='test.html'">📄 测试页</button>
    </div>

    <div class="card">
        <div class="emoji">🎉</div>
        <h1>test page</h1>
        <p>第二个HTML已成功部署</p>
    </div>

</body>
</html>
